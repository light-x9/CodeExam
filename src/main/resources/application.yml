server:
  port: 8080
spring:
  profiles:
    active: local   # 默认激活本地配置，自动加载 application-local.yml
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:3306/exam_system_new?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2b8
    username: root
    password: root
    hikari:
      connection-test-query: SELECT 1 # 自动检测连接
      connection-timeout: 60000 #数据库连接超时时间,默认30秒
      idle-timeout: 500000 #空闲连接存活最大时间，默认600000（10分钟）
      max-lifetime: 540000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
      maximum-pool-size: 12 #连接池最大连接数，默认是10
      minimum-idle: 10 #最小空闲连接数量
      pool-name: SPHHikariPool # 连接池名称
  data:
    redis:
      host: 192.168.100.128
      password: 209746
      port: 6379
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
#用于打印框架生成的sql语句，便于调试
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    auto-mapping-behavior: full #开启嵌套自动映射
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted # 全局逻辑删除的实体属性名(配置后可以忽略不配置步骤二)
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)

#用于打印框架生成的sql语句，便于调试

# 配置kimi api
# 服务地址
#          apikey
#          model
#          temperature
kimi:
  api:
    base-url: https://api.deepseek.com/v1/chat/completions
    # 生产环境通过环境变量注入: export KIMI_API_KEY=sk-xxx
    # 开发环境可在 application-local.yml 中覆盖（该文件已加入 .gitignore）
    api-key: ${KIMI_API_KEY:}
    model: deepseek-chat
    temperature: 0.3
    max-tokens: 4096
# ==================== Level 3：JWT 无状态认证配置 ====================
# JWT Secret 密钥 —— 生产环境必须用复杂随机字符串！
# HMAC-SHA256 算法要求密钥至少 256 bits（32字节）
# 下面的密钥仅用于学习，真实项目请用环境变量或配置中心管理
jwt:
  secret: exam_system_jwt_secret_key_2024_level3_learning
  expiration: 86400000  # Token 有效期：24小时（单位：毫秒）
  header: Authorization  # HTTP 请求头名称
  prefix: "Bearer "  # Token 前缀（Bearer 后面有个空格）
  blacklist:
    enabled: false  # Redis 黑名单开关：开发环境 false（不依赖 Redis），生产环境 true（启用黑名单）

logging:
  level:
    root: info  # 全局改回 info，防止刷屏
    # 只针对你想排查的部分开启 debug
    com.atguigu.exam: debug  # 你的业务代码
    org.springframework.data.redis: debug # Redis 操作相关
    io.lettuce.core: debug # Redis 连接驱动相关

# ==================== MinIO 对象存储配置 ====================
minio:
  endpoint: http://192.168.100.128:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: exam-system